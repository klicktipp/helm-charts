{{- if and .Values.enabled .Values.monitoring.serviceMonitor.enabled .Values.monitoring.service.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ template "rmqto.fullname" . }}
  labels:
    {{- include "rmqto.labels" . | nindent 4 }}
    {{- $serviceMonitorLabels := .Values.monitoring.serviceMonitor.labels }}
    {{- if $serviceMonitorLabels }}
    {{- include "rabbitmq-topology-operator.tplvalues.render" (dict "value" $serviceMonitorLabels "context" $) | nindent 4 }}
    {{- end }}
  namespace: {{ default (include "rabbitmq-topology-operator.namespace" .) .Values.monitoring.serviceMonitor.namespace | quote }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "rabbitmq-topology-operator.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  jobLabel: {{ .Values.monitoring.serviceMonitor.jobLabel }}
  selector:
    matchLabels:
      {{- include "rmqto.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: messaging-topology-operator
      # We need an extra label for the ServiceMonitor to scrape it correctly
      type: metrics
      {{- if .Values.monitoring.serviceMonitor.selector }}
      {{- include "rabbitmq-topology-operator.tplvalues.render" ( dict "value" .Values.monitoring.serviceMonitor.selector "context" $ ) | nindent 6 }}
      {{- end }}
  namespaceSelector:
    matchNames:
      - {{ include "rabbitmq-topology-operator.namespace" . }}
  endpoints:
    - port: https
      {{- if .Values.monitoring.serviceMonitor.scheme }}
      scheme: {{ .Values.monitoring.serviceMonitor.scheme }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.interval }}
      interval: {{ .Values.monitoring.serviceMonitor.interval }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.honorLabels }}
      honorLabels: {{ .Values.monitoring.serviceMonitor.honorLabels }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.scrapeTimeout }}
      scrapeTimeout: {{ .Values.monitoring.serviceMonitor.scrapeTimeout }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.metricRelabelings }}
      metricRelabelings: {{ toYaml .Values.monitoring.serviceMonitor.metricRelabelings | nindent 8 }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.relabelings }}
      relabelings: {{ toYaml .Values.monitoring.serviceMonitor.relabelings | nindent 8 }}
      {{- end }}
      {{- if .Values.monitoring.serviceMonitor.tlsConfig }}
      tlsConfig: {{ toYaml .Values.monitoring.serviceMonitor.tlsConfig | nindent 8 }}
      {{- end }}
{{- end }}
