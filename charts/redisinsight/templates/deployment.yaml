apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "redisinsight-chart.fullname" . }}
  labels:
    {{- include "redisinsight-chart.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "redisinsight-chart.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations .Values.redisinsight.redis_servers }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.redisinsight.redis_servers }}
        checksum/pre-setup-config: {{ include "redisinsight-chart.preSetupDatabases" . | sha256sum }}
        {{- end }}
      {{- end }}
      labels:
        {{- include "redisinsight-chart.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "redisinsight-chart.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      volumes:
        - name: data
          emptyDir: {}
        {{- if .Values.redisinsight.redis_servers }}
        - name: pre-setup-config
          configMap:
            name: {{ include "redisinsight-chart.fullname" . }}-config
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.redisinsight.port }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.redisinsight.port }}
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/health
              port: {{ .Values.redisinsight.port }}
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          env:
            - name: RI_APP_HOST
              value: {{ .Values.redisinsight.host | quote }}
            - name: RI_APP_PORT
              value: {{ .Values.redisinsight.port | quote }}
            - name: RI_ACCEPT_TERMS_AND_CONDITIONS
              value: "true"
            - name: RI_LOG_LEVEL
              value: info
            {{- if .Values.redisinsight.redis_servers }}
            - name: RI_PRE_SETUP_DATABASES_PATH
              value: {{ .Values.redisinsight.pre_setup_path | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: {{ .Values.redisinsight.data_dir }}
            {{- if .Values.redisinsight.redis_servers }}
            - name: pre-setup-config
              mountPath: {{ .Values.redisinsight.pre_setup_path }}
              subPath: databases.json
              readOnly: true
            {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
