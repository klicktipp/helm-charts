{{- $clusterRef := .Values.rabbitmq.cluster.name | default (include "rabbitmq-cluster.fullname" .) }}
{{- $vhost := include "rabbitmq-cluster.default-vhost" . }}
{{- $topologyValues := index .Values "rabbitmq-topology" | default (dict) }}
{{- $topologyRabbitmq := index $topologyValues "rabbitmq" | default (dict) }}
{{- $queues := (index (index $topologyRabbitmq "topology" | default (dict)) "queues") | default (dict) }}

{{- if and .Values.monitoring.enabled (.Capabilities.APIVersions.Has "monitoring.coreos.com/v1") }}
{{- if .Values.monitoring.queueAlerts.enabled }}
{{- range $name, $queue := $queues }}
{{- if and ($queue.enabled | default true) ($queue.alert_when_has_messages | default false ) }}
{{- $queueName := $queue.name | default $name }}
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ (printf "%s-%s-%s-unroutable" $clusterRef $vhost $queueName) | include "com.klicktipp.slugify-string" | quote }}
  labels:
    {{- include "rabbitmq-cluster.labels" $ | nindent 4 }}
spec:
  groups:
    - name: rabbitmq.queue.alerts
      rules:
        - alert: RabbitMQQueueNotEmpty
          expr: |
            max(
              rabbitmq_detailed_queue_messages{queue={{ $queueName | quote }}}
            ) > 0
          for: 1m
          labels:
            severity: warning
          annotations:
            summary: "RabbitMQ fallback queue has messages"
            description: "Queue {{ $queueName }} has {{`{{`}} $value {{`}}`}} messages (> 0)."

        - alert: RabbitMQQueueHighBacklog
          expr: |
            max(
              rabbitmq_detailed_queue_messages{queue={{ $queueName | quote }}}
            ) > 1000
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "RabbitMQ fallback queue backlog is critical"
            description: "Queue {{ $queueName }} has {{`{{`}} $value {{`}}`}} messages (> 1000). Immediate action required."

{{- end }} {{/* END if alert enabled */}}
{{- end }} {{/* END queue loop */}}
{{- end }} {{/* END if queue alerts enabled */}}
{{- end }} {{/* END if monitoring enabled */}}
