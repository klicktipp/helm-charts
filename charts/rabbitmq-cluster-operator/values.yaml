  hostAliases: []
  # -- Additional labels for Messaging Topology Operator pods
  podLabels: {}
  # -- Additional annotations for Messaging Topology Operator pods
  podAnnotations: {}
  # -- Affinity rules for Messaging Topology Operator pods
  affinity: {}
  # -- Node selector for Messaging Topology Operator pods
  nodeSelector: {}
  # -- Tolerations for Messaging Topology Operator pods
  tolerations: []
