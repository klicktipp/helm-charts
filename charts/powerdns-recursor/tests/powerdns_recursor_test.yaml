suite: powerdns-recursor-tests
release:
  namespace: powerdns-recursor
templates:
  - templates/configmaps.yaml
  - templates/deployment.yaml
  - templates/daemonset.yaml
  - templates/service.yaml
  - templates/service-cluster-dns-upstream.yaml
  - templates/poddisruptionbudget.yaml

tests:
  - it: should render a deployment by default
    asserts:
      - isKind:
          of: Deployment
        template: templates/deployment.yaml
      - equal:
          path: spec.replicas
          value: 1
        template: templates/deployment.yaml
      - hasDocuments:
          count: 0
        template: templates/daemonset.yaml
      - notExists:
          path: spec.internalTrafficPolicy
        template: templates/service.yaml
      - equal:
          path: data["recursor.yml"]
          value: |
            dnssec:
              validation: process
            incoming:
              listen:
              - 0.0.0.0
              port: 5353
            logging:
              loglevel: 6
              quiet: true
            outgoing:
              source_address:
              - 0.0.0.0
            recordcache:
              refresh_on_ttl_perc: 10
            recursor:
              config_dir: /etc/powerdns
              setgid: pdns
              setuid: pdns
              socket_mode: "660"
            webservice:
              webserver: false
        template: templates/configmaps.yaml
      - isKind:
          of: Service
        template: templates/service.yaml

  - it: should render a daemonset when workload type is set
    set:
      workload.type: DaemonSet
    asserts:
      - hasDocuments:
          count: 0
        template: templates/deployment.yaml
      - isKind:
          of: DaemonSet
        template: templates/daemonset.yaml
      - equal:
          path: spec.updateStrategy.type
          value: RollingUpdate
        template: templates/daemonset.yaml
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxUnavailable
          value: 0
        template: templates/daemonset.yaml
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxSurge
          value: 1
        template: templates/daemonset.yaml
      - equal:
          path: spec.minReadySeconds
          value: 5
        template: templates/daemonset.yaml

  - it: should default service internal traffic policy to local for daemonsets
    set:
      workload.type: DaemonSet
    asserts:
      - equal:
          path: spec.internalTrafficPolicy
          value: Local
        template: templates/service.yaml

  - it: should allow overriding service internal traffic policy for daemonsets
    set:
      workload.type: DaemonSet
      service.internalTrafficPolicy: Cluster
    asserts:
      - equal:
          path: spec.internalTrafficPolicy
          value: Cluster
        template: templates/service.yaml

  - it: should keep the configured clusterIP on the primary service in daemonset mode
    set:
      workload.type: DaemonSet
      service.clusterIP: 10.43.0.53
    asserts:
      - equal:
          path: spec.clusterIP
          value: 10.43.0.53
        template: templates/service.yaml

  - it: should not render the primary service when service.enabled is false
    set:
      service.enabled: false
    asserts:
      - hasDocuments:
          count: 0
        template: templates/service.yaml

  - it: should allow disabling the primary service in transparent daemonset mode
    set:
      workload.type: DaemonSet
      service.enabled: false
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
    asserts:
      - hasDocuments:
          count: 0
        template: templates/service.yaml
      - isKind:
          of: DaemonSet
        template: templates/daemonset.yaml

  - it: should render a pod disruption budget only for deployments
    set:
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - isKind:
          of: PodDisruptionBudget
        template: templates/poddisruptionbudget.yaml
      - equal:
          path: spec.maxUnavailable
          value: 1
        template: templates/poddisruptionbudget.yaml

  - it: should not render a pod disruption budget for daemonsets
    set:
      workload.type: DaemonSet
      podDisruptionBudget.maxUnavailable: 1
    asserts:
      - hasDocuments:
          count: 0
        template: templates/poddisruptionbudget.yaml

  - it: should not apply shortcut pod anti-affinity in daemonset mode
    set:
      workload.type: DaemonSet
      podAntiAffinity.type: hard
    asserts:
      - notExists:
          path: spec.template.spec.affinity
        template: templates/daemonset.yaml

  - it: should keep explicit affinity in daemonset mode
    set:
      workload.type: DaemonSet
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux
    asserts:
      - equal:
          path: spec.template.spec.affinity.nodeAffinity.requiredDuringSchedulingIgnoredDuringExecution.nodeSelectorTerms[0].matchExpressions[0].key
          value: kubernetes.io/os
        template: templates/daemonset.yaml

  - it: should render transparent dns takeover mode with an interceptor sidecar, host networking, and a local service-ip takeover
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
    asserts:
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxSurge
          value: 0
        template: templates/daemonset.yaml
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxUnavailable
          value: 1
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.hostNetwork
          value: true
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.dnsPolicy
          value: Default
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.priorityClassName
          value: system-node-critical
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.tolerations[0].key
          value: CriticalAddonsOnly
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.containers[1].name
          value: dns-interceptor
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 53
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.containers[0].readinessProbe.tcpSocket.host
          value: 172.20.0.10
        template: templates/daemonset.yaml
      - matchRegex:
          path: spec.template.spec.containers[1].image
          pattern: "^alpine:"
        template: templates/daemonset.yaml
      - matchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "ip addr add.*dev lo"
        template: templates/daemonset.yaml
      - matchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "NOTRACK"
        template: templates/daemonset.yaml
      - matchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "allow DNS traffic"
        template: templates/daemonset.yaml
      - notMatchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "REDIRECT --to-ports|DNAT --to-destination"
        template: templates/daemonset.yaml
      - equal:
          path: spec.template.spec.volumes[1].hostPath.path
          value: /run/xtables.lock
        template: templates/daemonset.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "forward_zones:[\\s\\S]*zone: cluster\\.local[\\s\\S]*172\\.20\\.0\\.11:53"
        template: templates/configmaps.yaml
      - isKind:
          of: Service
        template: templates/service-cluster-dns-upstream.yaml
      - equal:
          path: metadata.namespace
          value: kube-system
        template: templates/service-cluster-dns-upstream.yaml
      - equal:
          path: spec.clusterIP
          value: 172.20.0.11
        template: templates/service-cluster-dns-upstream.yaml
      - equal:
          path: spec.selector["k8s-app"]
          value: kube-dns
        template: templates/service-cluster-dns-upstream.yaml

  - it: should not create a generated cluster dns upstream service when a custom cluster dns ip is configured
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.customClusterDNSIP: 172.20.0.99
    asserts:
      - hasDocuments:
          count: 0
        template: templates/service-cluster-dns-upstream.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "forward_zones:[\\s\\S]*172\\.20\\.0\\.99:53"
        template: templates/configmaps.yaml

  - it: should replace existing transparent dns forwarding zones instead of duplicating them
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
      pdns.config.recursor.forward_zones:
        - zone: cluster.local
          forwarders:
            - 10.0.0.53:53
        - zone: example.org
          forwarders:
            - 10.0.0.54:53
    asserts:
      - notMatchRegex:
          path: data["recursor.yml"]
          pattern: "10\\.0\\.0\\.53:53"
        template: templates/configmaps.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "zone: example\\.org"
        template: templates/configmaps.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "10\\.0\\.0\\.54:53"
        template: templates/configmaps.yaml

  - it: should allow disabling runtime package installation in the dns interceptor
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
      transparentDNS.interceptor.enableRuntimeInstall: false
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "Runtime package installation is disabled"
        template: templates/daemonset.yaml
      - notMatchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "apk add --no-cache iptables iproute2"
        template: templates/daemonset.yaml

  - it: should keep transparent dns target reachable when incoming listen is explicitly set
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
      pdns.config.incoming.listen:
        - 192.0.2.10
    asserts:
      - isKind:
          of: DaemonSet
        template: templates/daemonset.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "incoming:[\\s\\S]*listen:[\\s\\S]*- 0\\.0\\.0\\.0[\\s\\S]*port: 53"
        template: templates/configmaps.yaml

  - it: should allow overriding the transparent dns maxSurge default with an explicit zero
    set:
      workload.type: DaemonSet
      workload.daemonSet.updateStrategy.rollingUpdate.maxSurge: 0
      transparentDNS.enabled: true
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
    asserts:
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxSurge
          value: 0
        template: templates/daemonset.yaml
      - equal:
          path: spec.updateStrategy.rollingUpdate.maxUnavailable
          value: 1
        template: templates/daemonset.yaml

  - it: should allow overriding the transparent dns bind port for local debugging
    set:
      workload.type: DaemonSet
      transparentDNS.enabled: true
      transparentDNS.bindPort: 5353
      transparentDNS.clusterDNS.serviceIP: 172.20.0.10
      transparentDNS.clusterDNS.namespace: kube-system
      transparentDNS.clusterDNS.upstreamService.clusterIP: 172.20.0.11
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 5353
        template: templates/daemonset.yaml
      - matchRegex:
          path: spec.template.spec.containers[1].args[0]
          pattern: "DNS_PORT=\\\"5353\\\""
        template: templates/daemonset.yaml
      - matchRegex:
          path: data["recursor.yml"]
          pattern: "incoming:[\\s\\S]*port: 5353"
        template: templates/configmaps.yaml
