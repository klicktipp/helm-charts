---
# Default values for powerdns-recursor.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# -- Number of pod replicas. Ignored in DaemonSet mode.
replicaCount: 1

# -- Number of old ReplicaSets to retain. Used by both Deployment and DaemonSet histories.
revisionHistoryLimit: 10

# -- Workload configuration.
workload:
  # -- Workload kind. Supported values: Deployment, DaemonSet.
  type: Deployment
  daemonSet:
    # -- DaemonSet-only settings. Ignored when workload.type=Deployment.
    updateStrategy:
      # -- DaemonSet update strategy type.
      type: RollingUpdate
      rollingUpdate:
        # -- Keep the existing pod on a node until a surged replacement is ready.
        maxUnavailable: 0
        # -- Allow one extra pod per node during rolling updates to avoid local DNS gaps.
        maxSurge: 1
    # -- Time a new DaemonSet pod must stay ready before it is considered available.
    minReadySeconds: 5

# -- Optional transparent DNS takeover mode. Experimental. Redirects pod traffic for the existing cluster DNS Service IP to the local Recursor without changing pod DNS settings.
transparentDNS:
  # -- Enable transparent interception of pod DNS traffic via the kube-dns/CoreDNS Service IP. Experimental.
  enabled: false
  # -- Link-local IP bound on each node and used as the local DNAT target.
  localIP: 169.254.20.25
  # -- Cluster DNS domain still forwarded to CoreDNS.
  clusterDomain: cluster.local
  clusterDNS:
    # -- Namespace where the cluster DNS pods live.
    namespace: kube-system
    # -- ClusterIP of the kube-dns/CoreDNS Service that pods already use today.
    serviceIP: ""
    upstreamService:
      # -- Create an auxiliary Service with its own fixed ClusterIP in front of the CoreDNS pods to avoid recursion through the intercepted clusterDNS.serviceIP.
      create: true
      # -- Override the generated upstream Service name.
      name: ""
      # -- Fixed ClusterIP of the auxiliary CoreDNS upstream Service. Required when create=true.
      clusterIP: ""
      # -- Service annotations for the auxiliary CoreDNS upstream Service.
      annotations: {}
    # -- Pod selector for the auxiliary CoreDNS upstream Service.
    selector:
      k8s-app: kube-dns
  # -- Use a pre-existing auxiliary CoreDNS upstream Service IP instead of creating one.
  customClusterDNSIP: ""
  interceptor:
    image:
      # -- Helper image used to add the local IP and program iptables. The default installs iproute2 and iptables at runtime.
      repository: alpine
      # -- Image tag of the interceptor helper image.
      tag: "3.21"
      # -- Pull policy for the interceptor helper image.
      pullPolicy: IfNotPresent
    # -- Package installation command executed before adding IPs and iptables rules.
    installPackagesCommand: apk add --no-cache iptables iproute2
  # -- Configure the network interface alias used by the interceptor.
  setupInterface: true
  # -- Configure iptables rules that transparently capture pod DNS traffic to clusterDNS.serviceIP.
  setupIptables: true
  # -- Also capture node-local processes hitting the cluster DNS Service IP via the OUTPUT chain.
  captureOutput: true
  # -- Leave IP alias and iptables rules behind when the pod exits.
  skipTeardown: false
  securityContext:
    # -- Run the interceptor as root so it can manipulate networking.
    runAsUser: 0
    # -- Run the interceptor with the root group.
    runAsGroup: 0
    capabilities:
      add:
        - NET_ADMIN
  resources:
    requests:
      cpu: 25m
      memory: 128Mi
    limits:
      memory: 128Mi
  # -- Default tolerations used only when transparentDNS.enabled=true and tolerations is empty.
  tolerations:
    - key: CriticalAddonsOnly
      operator: Exists
    - effect: NoExecute
      operator: Exists
    - effect: NoSchedule
      operator: Exists

# -- Image pull secrets.
imagePullSecrets: []

# -- Partially override generated resource names.
nameOverride: ""

# -- Fully override generated resource names.
fullnameOverride: ""

# -- ServiceAccount configuration.
serviceAccount:
  # -- Create a dedicated ServiceAccount.
  create: true
  # -- ServiceAccount annotations.
  annotations: {}
  # -- Explicit ServiceAccount name. If empty, a name is generated.
  name: ""
  # -- Mount API token into pods.
  automountServiceAccountToken: false

# -- Extra annotations added to the pod template.
podAnnotations: {}

# -- Extra labels added to the pod template.
podLabels: {}

# -- Pod-level security context.
podSecurityContext:
  # -- Unix user id.
  runAsUser: 953
  # -- Unix group id.
  runAsGroup: 953

# -- Container-level security context.
securityContext:
  # -- Unix user id.
  runAsUser: 953
  # -- Unix group id.
  runAsGroup: 953

# -- Optional priority class for pods.
priorityClassName: ""

# -- Pod anti-affinity shortcut (used when affinity is empty).
podAntiAffinity:
  # -- "soft", "hard" or "disabled". Ignored in DaemonSet mode.
  type: soft
  # -- Topology key used by anti-affinity.
  topologyKey: kubernetes.io/hostname

# -- Native affinity rules. If set, this overrides podAntiAffinity.
affinity: {}

# -- Node selector for scheduling.
nodeSelector: {}

# -- Tolerations for scheduling.
tolerations: []

# -- PodDisruptionBudget spec snippet. Example: { maxUnavailable: 1 }. Ignored in DaemonSet mode.
podDisruptionBudget: {}

# -- Service configuration.
service:
  # -- Service type.
  type: ClusterIP
  # -- Optional fixed ClusterIP for the primary Service.
  clusterIP: ""
  # -- Service internal traffic policy. When empty, DaemonSet mode defaults to "Local".
  internalTrafficPolicy: ""
  # -- DNS service port (TCP/UDP).
  port: 53
  # -- Service annotations.
  annotations: {}
  # -- Optional fixed LoadBalancer IP.
  loadBalancerIP: ""
  # -- Optional source ranges for LoadBalancer services.
  loadBalancerSourceRanges: []
  # -- Optional headless Service for direct pod DNS records.
  headless:
    # -- Enable creation of an additional headless Service (<fullname>-headless).
    enabled: false
    # -- Headless Service annotations.
    annotations: {}
    # -- Include DNS TCP/UDP ports on the headless Service.
    includeDnsPorts: true
    # -- Publish endpoints even for not-ready pods.
    publishNotReadyAddresses: false

# -- Ingress for the PowerDNS API endpoint (requires pdns.api.enabled=true).
ingress:
  # -- Enable ingress.
  enabled: false
  # -- ingressClassName value.
  className: ""
  # -- Ingress annotations.
  annotations: {}
  # -- Host/path rules.
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: Prefix
  # -- TLS sections.
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# -- PodMonitor configuration. Backward compatible: can also be boolean.
podMonitor:
  # -- Enable PodMonitor creation.
  enabled: false
  # -- Extra labels for PodMonitor metadata.
  additionalLabels: {}
  # -- Scrape interval.
  interval: 60s
  # -- Optional scrape timeout.
  scrapeTimeout: ""
  # -- Optional metrics path.
  path: ""
  # -- Optional scheme.
  scheme: ""
  # -- Optional job label override.
  jobLabel: ""
  # -- Optional custom relabelings.
  relabelings: []

# -- PrometheusRule configuration.
prometheusRule:
  # -- Enable PrometheusRule creation.
  enabled: false
  # -- Extra labels for PrometheusRule metadata.
  additionalLabels: {}
  # -- Extra annotations for PrometheusRule metadata.
  annotations: {}
  securityStatus:
    # -- Enable alerting for pdns_recursor_security_status.
    enabled: true
    # -- Time the condition must hold before firing.
    for: 15m
  # -- Additional PrometheusRule groups appended to the generated spec.
  additionalGroups: []

# -- Additional arbitrary manifests appended to the release.
extraObjects: []
# Example:
# extraObjects:
#   - apiVersion: v1
#     kind: ConfigMap
#     metadata:
#       name: "{{ include \"pdns.fullname\" . }}-extra"
#     data:
#       hello: world

# -- Container image configuration.
image:
  # -- Optional image registry prefix.
  registry: ""
  # -- Image repository.
  repository: powerdns/pdns-recursor-54
  # -- Image tag. If empty, chart appVersion is used.
  tag: ""
  # -- Image pull policy (preferred key).
  pullPolicy: IfNotPresent
  # -- Deprecated compatibility key. Leave empty to use image.pullPolicy.
  imagePullPolicy: ""

# -- Resource requests and limits.
resources: {}

# -- Probe configuration.
probes:
  # -- Liveness probe settings.
  liveness:
    # -- Initial delay before probing.
    initialDelaySeconds: 5
    # -- Probe period.
    periodSeconds: 5
    # -- Probe timeout.
    timeoutSeconds: 3
    # -- Failure threshold.
    failureThreshold: 3
  # -- Readiness probe settings.
  readiness:
    # -- Initial delay before probing.
    initialDelaySeconds: 5
    # -- Probe period.
    periodSeconds: 5
    # -- Probe timeout.
    timeoutSeconds: 3
    # -- Failure threshold.
    failureThreshold: 3

# -- PowerDNS recursor runtime configuration.
pdns:
  # -- Container DNS port.
  port: 5353
  # -- API endpoint settings.
  api:
    # -- Expose API port through the Service and container.
    enabled: false
    # -- API TCP port.
    port: 8082
  # -- Optional Lua config file support.
  lua:
    # -- Create additional Lua ConfigMap and mount recursor.lua.
    enabled: false
    # -- Lua script content written to /etc/powerdns/recursor.lua.
    script: |
      zoneToCache(".", "url", "https://www.internic.net/domain/root.zone", { refreshPeriod = 86400 })
  # -- Rendered directly into recursor.yml.
  config:
    recursor:
      config_dir: /etc/powerdns
      setgid: pdns
      setuid: pdns
      socket_mode: "660"
    incoming:
      port: 5353
      listen:
        - 0.0.0.0
    dnssec:
      validation: process
    outgoing:
      source_address:
        - 0.0.0.0
    logging:
      loglevel: 6
      quiet: true
    recordcache:
      # -- Refresh cache entries shortly before TTL expiry to reduce miss spikes.
      refresh_on_ttl_perc: 10
    webservice:
      webserver: false
  # -- Legacy compatibility block.
  metrics:
    enabled: false
