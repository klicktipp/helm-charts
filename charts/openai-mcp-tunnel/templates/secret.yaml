{{- if .Values.credentials.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openai-mcp-tunnel.secretName" . }}
  namespace: {{ include "openai-mcp-tunnel.namespace" . }}
  labels:
    {{- include "openai-mcp-tunnel.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.credentials.secretKey }}: {{ .Values.credentials.apiKey | quote }}
{{- end }}
