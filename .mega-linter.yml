---
# Configuration file for MegaLinter

IGNORE_GITIGNORED_FILES: true
YAML_YAMLLINT_CONFIG_FILE: .yamllint

# Helm templates are Go templates, and vendored CRDs should stay byte-close to upstream.
YAML_PRETTIER_FILTER_REGEX_EXCLUDE: (^|.*/)charts/[^/]+/(templates|crds)/.*\.ya?ml$
YAML_YAMLLINT_FILTER_REGEX_EXCLUDE: (^|.*/)charts/[^/]+/(templates|crds)/.*\.ya?ml$
YAML_V8R_FILTER_REGEX_EXCLUDE: (^|.*/)charts/[^/]+/(templates|crds)/.*\.ya?ml$

DISABLE:
  - COPYPASTE
DISABLE_LINTERS:
  - COPYPASTE_JSCPD

SHOW_ELAPSED_TIME: true
CLEAR_REPORT_FOLDER: true
REPORTERS_MARKDOWN_TYPE: simple
PRINT_ALPACA: false
